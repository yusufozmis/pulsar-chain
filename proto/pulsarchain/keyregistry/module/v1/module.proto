syntax = "proto3";
package pulsarchain.keyregistry.module.v1;

import "cosmos/app/v1alpha1/module.proto";

option go_package = "github.com/node101-io/pulsar-chain/x/keyregistry/types";

// Module is the config object for the module.
message Module {
  option (cosmos.app.v1alpha1.module) = {go_import: "github.com/node101-io/pulsar-chain/x/keyregistry"};

  // authority defines the custom module authority.
  // If not set, defaults to the governance module.
  string authority = 1;
}
